<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - GameHub</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <nav class="navbar">
        <div>
            <a href="/" class="nav-brand">GameHub</a>
            <a href="/videojuegos">Catálogo</a>
        </div>
        <div>
            <a href="/perfil" class="req-auth hidden">Mi Perfil</a>
            <a href="/mis_juegos" class="req-auth hidden">Mis Juegos</a>
            <a href="#" onclick="cerrarSesion()" class="req-auth hidden">Cerrar Sesión</a>
        </div>
    </nav>
    <div class="container">
        <h2>Catálogo de Videojuegos</h2>
        
        <form style="margin-bottom: 2rem; display:flex; gap:1rem;" action="/videojuegos" method="GET">
            <input type="text" name="titulo" class="form-control" placeholder="Buscar por título..." style="max-width:300px;">
            <select name="genero" class="form-control" style="max-width:200px;">
                <option value="">Cualquier Género</option>
                <option value="Plataformas">Plataformas</option>
                <option value="RPG">RPG</option>
                <option value="Acción">Acción</option>
                <option value="Puzzle">Puzzle</option>
            </select>
            <button type="submit" class="btn btn-primary">Buscar</button>
        </form>

        <div id="gridJuegos" class="grid-juegos">
            <!-- Cargado por JS -->
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/videojuegos.js"></script>
</body>
</html>
