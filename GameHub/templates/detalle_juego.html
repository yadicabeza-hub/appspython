<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Juego - GameHub</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <nav class="navbar">
        <div>
            <a href="/" class="nav-brand">GameHub</a>
            <a href="/videojuegos">Catálogo</a>
        </div>
        <div>
            <a href="/perfil" class="req-auth hidden">Mi Perfil</a>
            <a href="/mis_juegos" class="req-auth hidden">Mis Juegos</a>
            <a href="#" onclick="cerrarSesion()" class="req-auth hidden">Cerrar Sesión</a>
        </div>
    </nav>
    <div class="container">
        <div id="detalleJuego" class="form-card" style="max-width:1000px; margin-bottom:2rem;">
            <!-- Cargado por JS -->
        </div>

        <div style="max-width:1000px; margin:0 auto;">
            <h3>Escribir una Reseña</h3>
            <div id="msgResena"></div>
            <form id="formResena" class="req-auth hidden" style="margin-bottom:2rem;">
                <div class="form-group">
                    <label>Calificación (1 a 5)</label>
                    <input type="number" id="calificacion" class="form-control" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label>Comentario</label>
                    <textarea id="comentario" class="form-control" required rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enviar Reseña</button>
            </form>
            <p class="req-unauth">Debes <a href="/login">iniciar sesión</a> para dejar una reseña.</p>

            <h3>Reseñas de la Comunidad</h3>
            <div id="listaResenas">
                <!-- Cargado por JS -->
            </div>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/resenas.js"></script>
</body>
</html>
