<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - GameHub</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">GameHub</a>
    </nav>
    <div class="container">
        <div class="form-card">
            <h2>Crear Cuenta</h2>
            <div id="msgRegistro"></div>
            <form id="formRegistro">
                <div class="form-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="nombre_usuario" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="contrasena" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="confirmar" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Registrarse</button>
            </form>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/autenticacion.js"></script>
</body>
</html>
