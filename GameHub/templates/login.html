<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - GameHub</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">GameHub</a>
    </nav>
    <div class="container">
        <div class="form-card">
            <h2>Iniciar Sesión</h2>
            <div id="msgLogin"></div>
            <form id="formLogin">
                <div class="form-group">
                    <label>Usuario o Correo</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="contrasena" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
            <p style="margin-top:1rem">¿No tienes cuenta? <a href="/registro">Regístrate</a></p>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/autenticacion.js"></script>
</body>
</html>
